#
# OpenLiteSpeed main config — Laravel TechEmpower opponent (LSCache).
# Minimal, benchmark-only. Listener :8082 → vhost "laravel" (Laravel public/).
# lsphp84 external app handles PHP; the LSCache module caches the deterministic
# routes (/plaintext, /json, /fortunes) so they are served WITHOUT touching PHP.
#
# LSPHP_CHILDREN is templated by the entrypoint from BOOTGLY_WORKERS so the
# lsphp process pool tracks --server-workers (parity with FPM children = sw).
#

serverName                bench-ols
user                      nobody
group                     nogroup
priority                  0
autoRestart               1
gracefulRestartTimeout    300
mime                      conf/mime.properties
showVersionNumber         0
indexFiles                index.php

errorlog logs/error.log {
  logLevel                WARN
  debugLevel              0
  rollingSize             10M
  enableStderrLog         0
}
accesslog logs/access.log {
  logFormat               "%h %t \"%r\" %>s %b"
  rollingSize             10M
  keepDays                1
}

# ! lsphp external app — mirror the stock OLS definition (path fcgi-bin/lsphp is
#   the suEXEC-aware wrapper; pointing directly at lsphp84/bin/lsphp fails with
#   "cgidSuEXEC failed"). Pool size = LSPHP_CHILDREN (≈ server-workers).
extProcessor lsphp {
  type                    lsapi
  address                 uds://tmp/lshttpd/lsphp.sock
  maxConns                ${LSPHP_CHILDREN}
  env                     PHP_LSAPI_CHILDREN=${LSPHP_CHILDREN}
  env                     LSAPI_AVOID_FORK=200M
  initTimeout             60
  retryTimeout            0
  persistConn             1
  respBuffer              0
  autoStart               1
  path                    fcgi-bin/lsphp
  backlog                 100
  instances               1
  memSoftLimit            2047M
  memHardLimit            2047M
  procSoftLimit           10000
  procHardLimit           10000
}
scriptHandler {
  add                     lsapi:lsphp php
}

# ! LSCache module — public cache enabled; per-vhost rules decide what caches.
module cache {
  ls_enabled              1
  checkPrivateCache       0
  checkPublicCache        1
  maxCacheObjSize         10000000
  maxStaleAge             0
  qsCache                 1
  reqCookieCache          0
  ignoreReqCacheCtrl      1
  ignoreRespCacheCtrl     0
  enableCache             0
  expireInSeconds         120
  enablePrivateCache      0
  privateExpireInSeconds  120
}

virtualhost laravel {
  vhRoot                  /var/www/laravel
  configFile              conf/vhosts/laravel/vhconf.conf
  allowSymbolLink         1
  enableScript            1
  restrained              0
}

listener http {
  address                 *:8082
  secure                  0
  map                     laravel *
}
