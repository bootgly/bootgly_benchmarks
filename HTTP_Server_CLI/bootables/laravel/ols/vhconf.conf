#
# OpenLiteSpeed vhost — Laravel public/ front controller + LSCache rules.
#
# Cache strategy: the three deterministic TechEmpower routes are marked public
# cacheable via a rewrite env (Cache-Control), so OLS serves them from LSCache
# without invoking lsphp/Laravel after the first (priming) request:
#   /plaintext  /json  /fortunes
# The random/write routes (/db, /query, /updates) are never marked → always hit
# lsphp+Laravel+PostgreSQL (correct TFB semantics).
#

docRoot                   $VH_ROOT/public
enableGzip                0
enableBr                  0

errorlog $VH_ROOT/logs/vhost-error.log {
  logLevel                WARN
  rollingSize             10M
}

index {
  useServer               0
  indexFiles              index.php
}

# LSCache: public cache on; 120s TTL; query string ignored for cache key here
# (the cacheable routes carry no meaningful query string).
cache {
  enableCache             1
  checkPublicCache        1
  qsCache                 1
  reqCookieCache          0
  expireInSeconds         120
}

context / {
  location                $DOC_ROOT/
  allowBrowse             1
  indexFiles              index.php
  rewrite {
    enable                1
  }
  addDefaultCharset       off
}

rewrite {
  enable                  1
  logLevel                0
  rules                   <<<END_rules
# Mark the deterministic routes public-cacheable (LSCache stores the response).
RewriteRule ^/(plaintext|json|fortunes)/?$ - [E="Cache-Control:public,max-age=120"]

# Laravel front controller.
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^(.*)$ /index.php [L]
END_rules
}
